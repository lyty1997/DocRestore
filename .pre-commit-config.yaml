repos:
  - repo: local
    hooks:
      - id: mypy-strict
        name: mypy --strict
        entry: mypy --strict
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-check
        name: ruff check
        entry: ruff check --select E,F,W,B,C4,C90,UP,T20,ARG,RET,S,ASYNC,SIM105,PT --ignore RUF001,RUF002,RUF003
        language: system
        types: [python]
        pass_filenames: true

      - id: typos
        name: typos
        entry: /usr/local/bin/typos/typos
        language: system
        types: [python]
        pass_filenames: true
