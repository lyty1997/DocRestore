<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <script>
      /* 在 React 挂载前恢复主题偏好，避免闪烁 */
      (function(){var t=localStorage.getItem('docrestore-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light')})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
